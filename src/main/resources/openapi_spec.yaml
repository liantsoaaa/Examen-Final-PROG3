openapi: 3.0.3
info:
  title: API - Fédération de Collectivités Agricoles
  description: |
    API REST pour la digitalisation des processus administratifs de la Fédération
    de Collectivités Agricoles de Madagascar.

  version: 1.1.0


servers:
  - url: 'http://localhost:8080'
    description: Serveur de production

tags:
  - name: Collectivités
    description: Gestion des collectivités agricoles (A)
  - name: Membres
    description: Admission et gestion des membres (B)
  - name: Cotisations
    description: Gestion des cotisations et paiements (C)
  - name: Trésorerie
    description: Situation financičre et comptes (D)
  - name: Activités
    description: Gestion des activités (E)
  - name: Assiduité
    description: Présence et assiduité des membres (F)
  - name: Statistiques
    description: Rapports et statistiques d'une collectivité (G)
  - name: Statistiques Fédération
    description: Rapports et statistiques globaux de la fédération (H)


# PATHS

paths:


  # A ? OUVERTURE D'UNE NOUVELLE COLLECTIVITÉ


  /collectivites:
    get:
      tags: [Collectivités]
      summary: Lister toutes les collectivités
      operationId: listCollectivites
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: ville
          in: query
          description: Filtrer par ville
          schema:
            type: string
        - name: specialite
          in: query
          description: Filtrer par spécialité agricole
          schema:
            type: string
      responses:
        '200':
          description: Liste des collectivités
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Collectivite'

    post:
      tags: [Collectivités]
      summary: Soumettre une demande d'ouverture d'une nouvelle collectivité
      description: |
        Crée une demande d'ouverture de collectivité.
      operationId: creerCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreationRequest'
      responses:
        '201':
          description: Demande d'ouverture créée, en attente d'autorisation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Conditions d'ouverture non remplies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /collectivites/{collectiviteId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Collectivités]
      summary: Obtenir les détails d'une collectivité
      operationId: getCollectivite
      responses:
        '200':
          description: Détails de la collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Collectivités]
      summary: Mettre ŕ jour les informations d'une collectivité
      operationId: updateCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteUpdateRequest'
      responses:
        '200':
          description: Collectivité mise ŕ jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/autorisation:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    post:
      tags: [Collectivités]
      summary: Accorder ou refuser l'autorisation formelle d'ouverture (fédération uniquement)
      operationId: autoriserCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutorisationRequest'
      responses:
        '200':
          description: Décision enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Autorisation déjŕ accordée ou refusée


  # B ? ADMISSION D'UN NOUVEAU MEMBRE


  /collectivites/{collectiviteId}/membres:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Membres]
      summary: Lister les membres d'une collectivité
      operationId: listMembres
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: poste
          in: query
          description: Filtrer par poste
          schema:
            $ref: '#/components/schemas/PosteEnum'
        - name: actif
          in: query
          description: Filtrer les membres actifs (non démissionnaires)
          schema:
            type: boolean
      responses:
        '200':
          description: Liste des membres
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Membres]
      summary: Admettre un nouveau membre dans une collectivité
      description:
        Conditions d'admission (mise ŕ jour du 21 avril 2026)
        


      operationId: admettreMembreDansCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionMembreRequest'
      responses:
        '201':
          description: Membre admis avec succčs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Conditions d'admission non remplies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /collectivites/{collectiviteId}/membres/{membreId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    get:
      tags: [Membres]
      summary: Obtenir le profil d'un membre dans une collectivité
      operationId: getMembreDansCollectivite
      responses:
        '200':
          description: Profil du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/membres/{membreId}/transfert:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    post:
      tags: [Membres]
      summary: Transférer un membre vers une autre collectivité
      operationId: transfererMembre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [collectiviteCibleId]
              properties:
                collectiviteCibleId:
                  type: integer
                  description: Identifiant de la collectivité de destination
                motif:
                  type: string
                  description: Motif du transfert (ex. changement de ville)
      responses:
        '200':
          description: Transfert effectué
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/membres/{membreId}/demission:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/MembreId'
    post:
      tags: [Membres]
      summary: Enregistrer la démission d'un membre
      operationId: demissionnerMembre
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                motif:
                  type: string
                  description: Motif de la démission
                dateDemission:
                  type: string
                  format: date
      responses:
        '200':
          description: Démission enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Le membre a déjŕ démissionné

  /collectivites/{collectiviteId}/mandats:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Membres]
      summary: Lister les mandats d'une collectivité
      operationId: listMandats
      parameters:
        - name: annee
          in: query
          schema:
            type: integer
            example: 2025
      responses:
        '200':
          description: Liste des mandats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mandat'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Membres]
      summary: Créer un nouveau mandat annuel (résultats de vote)
      operationId: creerMandat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MandatCreationRequest'
      responses:
        '201':
          description: Mandat créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mandat'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Un membre dépasse la limite de 2 mandats pour un poste spécifique
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'


  # C ? COTISATION ET PAIEMENTS


  /collectivites/{collectiviteId}/cotisations:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Cotisations]
      summary: Lister les cotisations d'une collectivité
      operationId: listCotisations
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeCotisationEnum'
        - name: membreId
          in: query
          schema:
            type: integer
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste des cotisations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Cotisation'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Cotisations]
      summary: Enregistrer un encaissement de cotisation
      description: |
        Enregistre un paiement de cotisation .

      operationId: creerCotisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CotisationCreationRequest'
      responses:
        '201':
          description: Cotisation enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/cotisations/{cotisationId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - name: cotisationId
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Cotisations]
      summary: Obtenir les détails d'une cotisation
      operationId: getCotisation
      responses:
        '200':
          description: Détails de la cotisation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '404':
          $ref: '#/components/responses/NotFound'


  # D ? SITUATION DE TRÉSORERIE


  /collectivites/{collectiviteId}/comptes:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Trésorerie]
      summary: Lister les comptes d'une collectivité
      operationId: listComptes
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompteEnum'
      responses:
        '200':
          description: Liste des comptes (caisse, bancaire, mobile money)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Trésorerie]
      summary: Créer un nouveau compte pour une collectivité
      description: |
        - Une seule caisse par collectivité
        - Plusieurs comptes bancaires ou mobile money autorisés
        - Le numéro de compte bancaire doit respecter le format RIB (23 chiffres : BBBBBGGGGGCCCCCCCCCCCKKK)
      operationId: creerCompte
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteCreationRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Une caisse existe déjŕ pour cette collectivité
        '422':
          description: Format de numéro de compte invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /collectivites/{collectiviteId}/comptes/{compteId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/CompteId'
    get:
      tags: [Trésorerie]
      summary: Obtenir les détails d'un compte
      operationId: getCompte
      responses:
        '200':
          description: Détails du compte avec solde
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Trésorerie]
      summary: Mettre ŕ jour le solde d'un compte
      operationId: updateSoldeCompte
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [solde, dateReleve]
              properties:
                solde:
                  type: number
                  format: double
                  description: Nouveau solde en MGA
                dateReleve:
                  type: string
                  format: date
      responses:
        '200':
          description: Solde mis ŕ jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/comptes:
    get:
      tags: [Trésorerie]
      summary: Lister les comptes de la fédération
      operationId: listComptesFederation
      parameters:
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompteEnum'
      responses:
        '200':
          description: Liste des comptes de la fédération
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

    post:
      tags: [Trésorerie]
      summary: Créer un compte pour la fédération
      operationId: creerCompteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteCreationRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Une caisse existe déjŕ pour la fédération


  # E ? ACTIVITÉS


  /collectivites/{collectiviteId}/activites:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Activités]
      summary: Lister les activités d'une collectivité
      operationId: listActivitesCollectivite
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeActiviteEnum'
        - name: dateDebut
          in: query
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste des activités
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Activités]
      summary: Créer une activité exceptionnelle pour une collectivité
      description: |
        Crée une activité exceptionnelle (hors assemblée générale mensuelle et formation junior).
        La collectivité définit si la présence est obligatoire pour tous ou pour certains membres.
      operationId: creerActiviteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteCreationRequest'
      responses:
        '201':
          description: Activité créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/activites/{activiteId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/ActiviteId'
    get:
      tags: [Activités]
      summary: Obtenir les détails d'une activité
      operationId: getActiviteCollectivite
      responses:
        '200':
          description: Détails de l'activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Activités]
      summary: Modifier une activité
      operationId: updateActiviteCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteUpdateRequest'
      responses:
        '200':
          description: Activité mise ŕ jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Activités]
      summary: Supprimer une activité (avant sa tenue)
      operationId: deleteActiviteCollectivite
      responses:
        '204':
          description: Activité supprimée
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Activité déjŕ tenue, suppression impossible

  /collectivites/{collectiviteId}/calendrier:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Activités]
      summary: Obtenir le calendrier annuel des activités obligatoires
      description: |
        Retourne les dates des assemblées générales mensuelles et des formations juniors
        définies annuellement pour la collectivité.
      operationId: getCalendrierCollectivite
      parameters:
        - name: annee
          in: query
          required: true
          schema:
            type: integer
            example: 2026
      responses:
        '200':
          description: Calendrier annuel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendrierAnnuel'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Activités]
      summary: Définir ou mettre ŕ jour le calendrier annuel des activités obligatoires
      operationId: setCalendrierCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendrierAnnuelRequest'
      responses:
        '200':
          description: Calendrier mis ŕ jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendrierAnnuel'
        '400':
          $ref: '#/components/responses/BadRequest'

  /federation/activites:
    get:
      tags: [Activités]
      summary: Lister les activités planifiées par la fédération
      operationId: listActivitesFederation
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: obligatoire
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Liste des activités fédérales
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ActiviteFederation'

    post:
      tags: [Activités]
      summary: Planifier une activité fédérale
      operationId: creerActiviteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteFederationRequest'
      responses:
        '201':
          description: Activité fédérale créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteFederation'
        '400':
          $ref: '#/components/responses/BadRequest'


  # F ? ASSIDUITÉ DES MEMBRES


  /collectivites/{collectiviteId}/activites/{activiteId}/presences:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/ActiviteId'
    get:
      tags: [Assiduité]
      summary: Obtenir la fiche de présence d'une activité
      operationId: listPresences
      responses:
        '200':
          description: Fiche de présence complčte
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FichePresence'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Assiduité]
      summary: Enregistrer la présence (ou absence) d'un membre ŕ une activité
      description: |
        Le secrétaire enregistre la présence de chaque membre.
        Un membre peut ętre marqué absent excusé s'il a informé le secrétaire au préalable.
        Les membres d'autres collectivités peuvent ętre inscrits en fiche de présence
        mais ne comptent pas dans le taux d'assiduité annuel de leur collectivité d'origine.
      operationId: enregistrerPresence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresenceCreationRequest'
      responses:
        '201':
          description: Présence enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Presence'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Présence déjŕ enregistrée pour ce membre ŕ cette activité

  /collectivites/{collectiviteId}/activites/{activiteId}/presences/{membreId}:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
      - $ref: '#/components/parameters/ActiviteId'
      - $ref: '#/components/parameters/MembreId'
    patch:
      tags: [Assiduité]
      summary: Modifier le statut de présence d'un membre
      operationId: updatePresence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresenceUpdateRequest'
      responses:
        '200':
          description: Présence mise ŕ jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Presence'
        '404':
          $ref: '#/components/responses/NotFound'


  # G ? STATISTIQUES D'UNE COLLECTIVITÉ


  /collectivites/{collectiviteId}/statistiques/rapport-mensuel:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Statistiques]
      summary: Obtenir le rapport mensuel de la collectivité (pour la fédération)
      description: |
        Retourne le taux d'assiduité globale et le nombre de membres inscrits
        pour un mois donné. Ce rapport est transmis par le président ŕ la fédération.
      operationId: getRapportMensuel
      parameters:
        - name: annee
          in: query
          required: true
          schema:
            type: integer
            example: 2026
        - name: mois
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 4
      responses:
        '200':
          description: Rapport mensuel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportMensuel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectiviteId}/statistiques/membres:
    parameters:
      - $ref: '#/components/parameters/CollectiviteId'
    get:
      tags: [Statistiques]
      summary: Obtenir les statistiques détaillées par membre actif
      description: |
        Fournit pour chaque membre actif (non démissionnaire) :
        - Taux d'assiduité sur une période donnée
        - Montant total des cotisations encaissées sur la période
        - Montant des cotisations impayées potentielles sur la période
      operationId: getStatistiquesMembres
      parameters:
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-01-01'
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-04-16'
      responses:
        '200':
          description: Statistiques détaillées des membres actifs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatistiqueMembre'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/rapports:
    get:
      tags: [Statistiques]
      summary: Lister les rapports mensuels reçus par la fédération
      operationId: listRapportsFederation
      parameters:
        - name: annee
          in: query
          schema:
            type: integer
        - name: mois
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: collectiviteId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Liste des rapports reçus
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RapportMensuel'

 # H ? STATISTIQUES DE LA FÉDÉRATION


  /federation/statistiques/assiduites:
    get:
      tags: [Statistiques Fédération]
      summary: Taux d'assiduité global de chaque collectivité sur une période
      description: |
        Retourne, pour chaque collectivité, le taux d'assiduité global calculé
        sur la période demandée. Utilisé par le secrétaire de la fédération pour
        le rapport mensuel et annuel présenté lors des assemblées générales.
      operationId: getStatistiquesAssiduiteFederation
      parameters:
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-01-01'
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-04-21'
        - name: collectiviteId
          in: query
          description: Filtrer sur une collectivité spécifique (optionnel)
          schema:
            type: integer
      responses:
        '200':
          description: Taux d'assiduité par collectivité
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatAssiduiteCollectivite'
        '400':
          $ref: '#/components/responses/BadRequest'

  /federation/statistiques/cotisations:
    get:
      tags: [Statistiques Fédération]
      summary: Pourcentage de membres ŕ jour dans leurs cotisations, par collectivité
      description: |
        Pour chaque collectivité, retourne le pourcentage de membres actifs
        ayant réglé l'intégralité de leurs cotisations obligatoires sur la période donnée.
        Permet d'identifier les collectivités avec un fort taux d'impayés.
      operationId: getStatistiquesCotisationsFederation
      parameters:
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-01-01'
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-04-21'
        - name: collectiviteId
          in: query
          description: Filtrer sur une collectivité spécifique (optionnel)
          schema:
            type: integer
      responses:
        '200':
          description: Pourcentage de membres ŕ jour par collectivité
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatCotisationsCollectivite'
        '400':
          $ref: '#/components/responses/BadRequest'

  /federation/statistiques/adherents:
    get:
      tags: [Statistiques Fédération]
      summary: Nombre de nouveaux adhérents par collectivité sur une période
      description: |
        Retourne le nombre de membres ayant adhéré ŕ chaque collectivité
        sur la période donnée. Permet de mesurer la croissance de chaque collectivité.
      operationId: getStatistiquesAdherentsFederation
      parameters:
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-01-01'
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-04-21'
        - name: collectiviteId
          in: query
          description: Filtrer sur une collectivité spécifique (optionnel)
          schema:
            type: integer
      responses:
        '200':
          description: Nombre de nouveaux adhérents par collectivité
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatAdherentsCollectivite'
        '400':
          $ref: '#/components/responses/BadRequest'

  /federation/statistiques/rapport-global:
    get:
      tags: [Statistiques Fédération]
      summary: Rapport global de la fédération (mensuel ou annuel)
      description: |
        Rapport consolidé établi par le secrétaire de la fédération, regroupant
        pour chaque collectivité et sur une période donnée :
        - Le taux d'assiduité global
        - Le pourcentage de membres ŕ jour dans leurs cotisations
        - Le nombre de nouveaux adhérents
        
        Ce rapport est présenté lors des assemblées générales annuelles.
      operationId: getRapportGlobalFederation
      parameters:
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-01-01'
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: '2026-12-31'
      responses:
        '200':
          description: Rapport global de la fédération
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportGlobalFederation'
        '400':
          $ref: '#/components/responses/BadRequest'


# ?????????????????????????????????????????????????????????????
# COMPONENTS
# ?????????????????????????????????????????????????????????????
components:

  # ?? PARAMETERS ??????????????????????????????????????????????
  parameters:
    CollectiviteId:
      name: collectiviteId
      in: path
      required: true
      description: Identifiant unique de la collectivité
      schema:
        type: integer
        example: 1

    MembreId:
      name: membreId
      in: path
      required: true
      description: Identifiant unique du membre
      schema:
        type: integer
        example: 42

    ActiviteId:
      name: activiteId
      in: path
      required: true
      description: Identifiant unique de l'activité
      schema:
        type: integer
        example: 10

    CompteId:
      name: compteId
      in: path
      required: true
      description: Identifiant unique du compte
      schema:
        type: integer
        example: 5

    PageParam:
      name: page
      in: query
      description: Numéro de page (pagination)
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      description: Nombre d'éléments par page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  # ?? RESPONSES ????????????????????????????????????????????????
  responses:
    BadRequest:
      description: Requęte invalide (données manquantes ou mal formées)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'

    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'

    Forbidden:
      description: Action non autorisée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'

  # ?? SCHEMAS ??????????????????????????????????????????????????
  schemas:

    # ? Enums ???????????????????????????????????????????????????

    PosteEnum:
      type: string
      enum:
        - PRESIDENT
        - PRESIDENT_ADJOINT
        - TRESORIER
        - SECRETAIRE
        - MEMBRE_CONFIRME
        - MEMBRE_JUNIOR
      description: Poste d'un membre dans une collectivité

    GenreEnum:
      type: string
      enum:
        - MASCULIN
        - FEMININ

    TypeCotisationEnum:
      type: string
      enum:
        - MENSUELLE
        - ANNUELLE
        - PONCTUELLE

    ModePaiementEnum:
      type: string
      enum:
        - ESPECE
        - VIREMENT_BANCAIRE
        - MOBILE_MONEY

    TypeCompteEnum:
      type: string
      enum:
        - CAISSE
        - BANCAIRE
        - MOBILE_MONEY

    BanqueEnum:
      type: string
      enum:
        - BRED
        - MCB
        - BMOI
        - BOA
        - BGFI
        - AFG
        - ACCES_BANQUE
        - BAOBAB
        - SIPEM

    MobileMoneyEnum:
      type: string
      enum:
        - ORANGE_MONEY
        - MVOLA
        - AIRTEL_MONEY

    TypeActiviteEnum:
      type: string
      enum:
        - AG_MENSUELLE
        - FORMATION_JUNIOR
        - EXCEPTIONNELLE

    StatutPresenceEnum:
      type: string
      enum:
        - PRESENT
        - ABSENT
        - ABSENT_EXCUSE

    # ? Collectivité ????????????????????????????????????????????

    Collectivite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        numero:
          type: string
          description: Numéro unique de la collectivité
          example: "COLL-001"
        nom:
          type: string
          description: Nom unique de la collectivité
          example: "Collectivité Agricole d'Antananarivo"
        specialite:
          type: string
          description: Spécialité agricole
          example: "Riziculture"
        ville:
          type: string
          example: "Antananarivo"
        dateCreation:
          type: string
          format: date
          readOnly: true
        statut:
          type: string
          enum: [EN_ATTENTE, AUTORISEE, REFUSEE]
          readOnly: true
        nombreMembres:
          type: integer
          readOnly: true

    CollectiviteCreationRequest:
      type: object
      required: [nom, specialite, ville, membresInitiaux, postesInitiaux]
      properties:
        nom:
          type: string
        specialite:
          type: string
        ville:
          type: string
        membresInitiaux:
          type: array
          minItems: 10
          description: Liste des IDs des membres fondateurs (? 10, ancienneté ? 6 mois)
          items:
            type: integer
        postesInitiaux:
          type: object
          description: Attribution des postes spécifiques pour le premier mandat
          required: [presidentId, presidentAdjointId, tresorierEd, secretaireId]
          properties:
            presidentId:
              type: integer
            presidentAdjointId:
              type: integer
            tresorierEd:
              type: integer
            secretaireId:
              type: integer

    CollectiviteUpdateRequest:
      type: object
      properties:
        nom:
          type: string
        specialite:
          type: string
        ville:
          type: string

    AutorisationRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [ACCORDEE, REFUSEE]
        commentaire:
          type: string

    # ? Membre ??????????????????????????????????????????????????

    Membre:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nom:
          type: string
        prenom:
          type: string
        dateNaissance:
          type: string
          format: date
        genre:
          $ref: '#/components/schemas/GenreEnum'
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
        email:
          type: string
          format: email
        dateAdhesion:
          type: string
          format: date
          readOnly: true
        collectiviteId:
          type: integer
          readOnly: true
        poste:
          $ref: '#/components/schemas/PosteEnum'
        actif:
          type: boolean
          description: false si le membre a démissionné
          readOnly: true

    AdmissionMembreRequest:
      type: object
      required: [nom, prenom, dateNaissance, genre, adresse, metier, telephone, email, parrains, paiement]
      properties:
        nom:
          type: string
        prenom:
          type: string
        dateNaissance:
          type: string
          format: date
        genre:
          $ref: '#/components/schemas/GenreEnum'
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
        email:
          type: string
          format: email
        parrains:
          type: array
          minItems: 2
          description: |
            Liste des parrains (minimum 2 membres confirmés de la fédération).
            Le nombre de parrains de la collectivité cible doit ętre ? au nombre
            de parrains issus d'autres collectivités. Chaque parrain doit avoir
            une ancienneté > 90 jours.
          items:
            $ref: '#/components/schemas/ParrainageRequest'
        paiement:
          $ref: '#/components/schemas/PaiementAdhesionRequest'

    # ? Mandat ??????????????????????????????????????????????????

    Mandat:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        collectiviteId:
          type: integer
        annee:
          type: integer
          description: Année civile du mandat
        presidentId:
          type: integer
        presidentAdjointId:
          type: integer
        tresorierEId:
          type: integer
        secretaireId:
          type: integer
        dateDebut:
          type: string
          format: date
        dateFin:
          type: string
          format: date

    MandatCreationRequest:
      type: object
      required: [annee, presidentId, presidentAdjointId, tresoierId, secretaireId]
      properties:
        annee:
          type: integer
          example: 2026
        presidentId:
          type: integer
        presidentAdjointId:
          type: integer
        tresoierId:
          type: integer
        secretaireId:
          type: integer

    # ? Cotisation ??????????????????????????????????????????????

    Cotisation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        collectiviteId:
          type: integer
        membreId:
          type: integer
        type:
          $ref: '#/components/schemas/TypeCotisationEnum'
        montant:
          type: number
          format: double
          description: Montant en MGA
        dateEncaissement:
          type: string
          format: date
        modePaiement:
          $ref: '#/components/schemas/ModePaiementEnum'
        motif:
          type: string
          description: Motif pour les cotisations ponctuelles
        montantReverseFederation:
          type: number
          format: double
          description: Part reversée ŕ la fédération (cotisations périodiques uniquement)
          readOnly: true

    CotisationCreationRequest:
      type: object
      required: [membreId, type, montant, dateEncaissement, modePaiement]
      properties:
        membreId:
          type: integer
        type:
          $ref: '#/components/schemas/TypeCotisationEnum'
        montant:
          type: number
          format: double
        dateEncaissement:
          type: string
          format: date
        modePaiement:
          $ref: '#/components/schemas/ModePaiementEnum'
        motif:
          type: string
          description: Obligatoire si type = PONCTUELLE

    # ? Compte ??????????????????????????????????????????????????

    Compte:
      type: object
      discriminator:
        propertyName: type
      properties:
        id:
          type: integer
          readOnly: true
        type:
          $ref: '#/components/schemas/TypeCompteEnum'
        nomTitulaire:
          type: string
        solde:
          type: number
          format: double
          description: Solde en MGA
        dateSolde:
          type: string
          format: date
          description: Date du dernier relevé de solde

    CompteBancaire:
      allOf:
        - $ref: '#/components/schemas/Compte'
        - type: object
          required: [nomTitulaire, banque, numerCompte]
          properties:
            banque:
              $ref: '#/components/schemas/BanqueEnum'
            numerCompte:
              type: string
              pattern: '^\d{5}\d{5}\d{11}\d{2}$'
              description: "Format RIB : BBBBBGGGGGCCCCCCCCCCCKKK (23 chiffres)"
              example: "12345678901234567890123"

    CompteMobileMoney:
      allOf:
        - $ref: '#/components/schemas/Compte'
        - type: object
          required: [nomTitulaire, serviceMobileMoney, numerTelephone]
          properties:
            serviceMobileMoney:
              $ref: '#/components/schemas/MobileMoneyEnum'
            numerTelephone:
              type: string
              pattern: '^\+?[0-9]{10,15}$'
              description: Numéro unique associé au compte mobile money

    CompteCreationRequest:
      type: object
      required: [type, nomTitulaire]
      properties:
        type:
          $ref: '#/components/schemas/TypeCompteEnum'
        nomTitulaire:
          type: string
        # Champs bancaires (si type = BANCAIRE)
        banque:
          $ref: '#/components/schemas/BanqueEnum'
        numerCompte:
          type: string
          pattern: '^\d{23}$'
        # Champs mobile money (si type = MOBILE_MONEY)
        serviceMobileMoney:
          $ref: '#/components/schemas/MobileMoneyEnum'
        numerTelephone:
          type: string

    # ? Activité ????????????????????????????????????????????????

    Activite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        collectiviteId:
          type: integer
        type:
          $ref: '#/components/schemas/TypeActiviteEnum'
        titre:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        lieu:
          type: string
        presenceObligatoire:
          type: boolean
          description: Si true, présence obligatoire pour tous les membres concernés
        membresConviesIds:
          type: array
          items:
            type: integer
          description: |
            Si null ou vide, l'activité s'adresse ŕ tous les membres.
            Sinon, liste des IDs de membres pour qui la présence est requise.

    ActiviteCreationRequest:
      type: object
      required: [titre, date, presenceObligatoire]
      properties:
        titre:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        lieu:
          type: string
        presenceObligatoire:
          type: boolean
        membresConviesIds:
          type: array
          items:
            type: integer

    ActiviteUpdateRequest:
      type: object
      properties:
        titre:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        lieu:
          type: string
        presenceObligatoire:
          type: boolean
        membresConviesIds:
          type: array
          items:
            type: integer

    CalendrierAnnuel:
      type: object
      properties:
        collectiviteId:
          type: integer
        annee:
          type: integer
        assembleeGenerale:
          type: object
          description: Rčgle de récurrence pour l'AG mensuelle
          properties:
            regle:
              type: string
              description: Ex. "2e dimanche du mois"
              example: "2e dimanche du mois"
            dates:
              type: array
              items:
                type: string
                format: date
              description: Liste des 12 dates générées
        formationJunior:
          type: object
          description: Rčgle de récurrence pour la formation junior mensuelle
          properties:
            regle:
              type: string
              example: "4e samedi du mois"
            dates:
              type: array
              items:
                type: string
                format: date

    CalendrierAnnuelRequest:
      type: object
      required: [annee, regleAssembleeGenerale, regleFormationJunior]
      properties:
        annee:
          type: integer
          example: 2026
        regleAssembleeGenerale:
          type: string
          description: Rčgle de récurrence (ex. "2e dimanche du mois")
          example: "2e dimanche du mois"
        regleFormationJunior:
          type: string
          example: "4e samedi du mois"

    ActiviteFederation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        titre:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        lieu:
          type: string
        presenceObligatoire:
          type: boolean
          description: Si obligatoire, toutes les collectivités doivent participer
        collectivitesConvieesIds:
          type: array
          items:
            type: integer
          description: Liste des collectivités invitées (vide = toutes)

    ActiviteFederationRequest:
      type: object
      required: [titre, date, presenceObligatoire]
      properties:
        titre:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        lieu:
          type: string
        presenceObligatoire:
          type: boolean
        collectivitesConvieesIds:
          type: array
          items:
            type: integer

    # ? Assiduité / Présence ????????????????????????????????????

    Presence:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        activiteId:
          type: integer
        membreId:
          type: integer
        collectiviteMembreId:
          type: integer
          description: Collectivité d'appartenance du membre (peut ętre différente de l'hôte)
        statut:
          $ref: '#/components/schemas/StatutPresenceEnum'
        motifAbsence:
          type: string
          description: Obligatoire si statut = ABSENT_EXCUSE
        compteDansAssiduiteAnnuelle:
          type: boolean
          readOnly: true
          description: false si le membre appartient ŕ une autre collectivité

    FichePresence:
      type: object
      properties:
        activiteId:
          type: integer
        titreActivite:
          type: string
        date:
          type: string
          format: date-time
        presences:
          type: array
          items:
            $ref: '#/components/schemas/Presence'
        totalPresents:
          type: integer
        totalAbsents:
          type: integer
        totalExcuses:
          type: integer

    PresenceCreationRequest:
      type: object
      required: [membreId, statut]
      properties:
        membreId:
          type: integer
        statut:
          $ref: '#/components/schemas/StatutPresenceEnum'
        motifAbsence:
          type: string

    PresenceUpdateRequest:
      type: object
      required: [statut]
      properties:
        statut:
          $ref: '#/components/schemas/StatutPresenceEnum'
        motifAbsence:
          type: string

    # ? Statistiques ????????????????????????????????????????????

    RapportMensuel:
      type: object
      properties:
        collectiviteId:
          type: integer
        collectiviteNom:
          type: string
        annee:
          type: integer
        mois:
          type: integer
        nombreMembresInscrits:
          type: integer
        tauxAssiduitePourcentage:
          type: number
          format: double
          description: Taux d'assiduité global de la collectivité pour le mois (en %)
        dateRapport:
          type: string
          format: date-time
          readOnly: true

    StatistiqueMembre:
      type: object
      properties:
        membreId:
          type: integer
        nom:
          type: string
        prenom:
          type: string
        poste:
          $ref: '#/components/schemas/PosteEnum'
        tauxAssiduitePourcentage:
          type: number
          format: double
          description: Taux d'assiduité sur la période demandée (en %)
        montantEncaisseTotal:
          type: number
          format: double
          description: Total des cotisations payées sur la période (en MGA)
        montantImpayePotentiel:
          type: number
          format: double
          description: Montant des cotisations attendues non réglées sur la période (en MGA)

    # ? Parrainage (B-2) ????????????????????????????????????????

    ParrainageRequest:
      type: object
      required: [membreId, relationAvecCandidat]
      properties:
        membreId:
          type: integer
          description: ID du membre confirmé qui parraine le candidat (ancienneté > 90 jours)
        relationAvecCandidat:
          type: string
          description: Nature de la relation entre le parrain et le candidat
          example: "famille"
          enum:
            - FAMILLE
            - AMIS
            - COLLEGUES
            - VOISINS
            - AUTRE

    PaiementAdhesionRequest:
      type: object
      required: [modePaiement, referenceFraisAdhesion]
      description: |
        Paiements obligatoires ŕ l'adhésion :
        1. Frais d'adhésion fixe de 50 000 MGA
        2. Cotisations annuelles obligatoires de la collectivité (montant variable selon la collectivité)
        Les deux doivent ętre réglés intégralement avant validation de l'admission.
      properties:
        modePaiement:
          type: string
          enum: [MOBILE_MONEY, VIREMENT_BANCAIRE]
          description: Mode de paiement (espčce non acceptée pour l'adhésion)
        referenceFraisAdhesion:
          type: string
          description: Référence de transaction pour les 50 000 MGA de frais d'adhésion
        referenceCotisationsAnnuelles:
          type: string
          description: |
            Référence de transaction pour le rčglement des cotisations annuelles obligatoires.
            Obligatoire si la collectivité impose des cotisations annuelles (montant > 0).
        montantCotisationsAnnuelles:
          type: number
          format: double
          description: |
            Montant des cotisations annuelles réglées, en MGA.
            Doit correspondre exactement au montant imposé par la collectivité.
          example: 200000

    # ? Statistiques Fédération (H) ?????????????????????????????

    StatAssiduiteCollectivite:
      type: object
      description: Taux d'assiduité global d'une collectivité sur une période donnée
      properties:
        collectiviteId:
          type: integer
        collectiviteNom:
          type: string
        nombreActivitesPeriode:
          type: integer
          description: Nombre total d'activités obligatoires tenues sur la période
        tauxAssiduitePourcentage:
          type: number
          format: double
          description: Taux d'assiduité global (présences / présences attendues) en %
          example: 78.5

    StatCotisationsCollectivite:
      type: object
      description: Pourcentage de membres ŕ jour dans leurs cotisations sur une période
      properties:
        collectiviteId:
          type: integer
        collectiviteNom:
          type: string
        nombreMembresActifs:
          type: integer
          description: Nombre de membres actifs (non démissionnaires) sur la période
        nombreMembresAJour:
          type: integer
          description: Membres ayant réglé l'intégralité de leurs cotisations obligatoires
        pourcentageMembresAJour:
          type: number
          format: double
          description: Pourcentage de membres ŕ jour (en %)
          example: 85.0
        montantTotalEncaisse:
          type: number
          format: double
          description: Montant total des cotisations encaissées sur la période (en MGA)
        montantTotalImpaye:
          type: number
          format: double
          description: Montant total des cotisations impayées sur la période (en MGA)

    StatAdherentsCollectivite:
      type: object
      description: Nouveaux adhérents d'une collectivité sur une période donnée
      properties:
        collectiviteId:
          type: integer
        collectiviteNom:
          type: string
        nombreNouveauxAdherents:
          type: integer
          description: Nombre de nouveaux membres ayant adhéré sur la période
        nombreDemissions:
          type: integer
          description: Nombre de membres ayant démissionné sur la période
        soldeNetMembres:
          type: integer
          description: nombreNouveauxAdherents - nombreDemissions

    RapportGlobalFederation:
      type: object
      description: |
        Rapport consolidé de la fédération regroupant toutes les statistiques
        clés de chaque collectivité sur une période donnée.
        Établi par le secrétaire de la fédération et présenté lors des AG annuelles.
      properties:
        dateDebut:
          type: string
          format: date
        dateFin:
          type: string
          format: date
        dateGeneration:
          type: string
          format: date-time
          readOnly: true
        nombreTotalCollectivites:
          type: integer
        nombreTotalMembresActifs:
          type: integer
        statistiquesParCollectivite:
          type: array
          items:
            $ref: '#/components/schemas/StatGlobaleCollectivite'

    StatGlobaleCollectivite:
      type: object
      description: Agrégation des trois indicateurs clés pour une collectivité
      properties:
        collectiviteId:
          type: integer
        collectiviteNom:
          type: string
        ville:
          type: string
        specialite:
          type: string
        assiduites:
          $ref: '#/components/schemas/StatAssiduiteCollectivite'
        cotisations:
          $ref: '#/components/schemas/StatCotisationsCollectivite'
        adherents:
          $ref: '#/components/schemas/StatAdherentsCollectivite'

